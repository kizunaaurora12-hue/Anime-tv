name: Build MiyukiTV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 7.3.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.3.3'

    - name: Fix gradlew permissions and line endings
      run: |
        sed -i 's/\r//' gradlew
        chmod +x gradlew

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Sign APK
      run: |
        keytool -genkey -v -keystore miyuki.keystore \
          -alias miyuki -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=MiyukiTV, OU=Anime, O=MiyukiTV, L=ID, S=ID, C=ID" \
          -storepass miyuki2025 -keypass miyuki2025 -noprompt

        APKSIGNER="$(find ${ANDROID_HOME}/build-tools/ -name 'apksigner' | sort -r | head -1)"

        $APKSIGNER sign \
          --ks miyuki.keystore \
          --ks-pass pass:miyuki2025 \
          --key-pass pass:miyuki2025 \
          --out MiyukiTV.apk \
          app/build/outputs/apk/release/*.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiyukiTV-APK-${{ github.run_number }}
        path: MiyukiTV.apk

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0-build${{ github.run_number }}
        name: MiyukiTV v1.0 (Build ${{ github.run_number }})
        files: MiyukiTV.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
